server:
  shutdown: immediate
customdatasource:
  activities:
    url: jdbc:h2:mem:datamart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS domain\;
    username: sa
    password: sa
    driver: org.h2.Driver
  redshift:
    url: jdbc:h2:mem:datamart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS domain\;
    username: sa
    password: sa
    driver: org.h2.Driver
spring:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      client:
        registration:
          default:
            provider: hmpps-auth
            authorization-grant-type: client_credentials
            client-id: API_CLIENT_CREDENTIALS_ID
            client-secret: API_CLIENT_CREDENTIALS_SECRET
        provider:
          hmpps-auth:
            token-uri: test
      resourceserver:
        jwt:
          jwk-set-uri: test

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

dpr:
  lib:
    caseloads:
      host: http://localhost:9999
    manage-users:
      host: http://localhost:9999
    user:
      role: ROLE_PRISONS_REPORTING_TOOLS_USER
    system:
      role: ROLE_PRISONS_REPORTING_TOOLS_USER
      token:
        enabled: false
    redshiftdataapi:
      secretarn: REDSHIFT_DATA_SECRETARN
      clusterid: REDSHIFT_DATA_CLUSTER_ID
      database: REDSHIFT_DATA_DB
      tokenrefreshdurationsec: 3600
      rolearn: arn:aws:iam::771283872747:role/dpr-cross-account-role-demo
      rolesessionname: dpr-cross-account-role-session
      s3location: dpr-working-development/reports
      athenaworkgroup: athenaWorkgroup
    definition:
      repository: memory
