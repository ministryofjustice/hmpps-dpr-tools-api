spring:
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
    ddl-auto: create-drop
  application:
    name: hmpps-dpr-tools-api
  codec:
    max-in-memory-size: 10MB

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    default-property-inclusion: NON_NULL

  profiles:
    group:
      test:
        - "stdout"

  security:
    oauth2:
      client:
        registration:
          DPR_LIB_API:
            provider: hmpps-auth
            authorization-grant-type: client_credentials
            client-id: ${API_CLIENT_CREDENTIALS_ID}
            client-secret: ${API_CLIENT_CREDENTIALS_SECRET}
        provider:
          hmpps-auth:
            token-uri: ${hmpps.auth.url}/oauth/token
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps.auth.url}/.well-known/jwks.json

server:
  port: 8081
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful
  error:
    include-message: always

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

springdoc:
  default-produces-media-type: application/json


dpr:
  lib:
    caseloads:
      host: ${ME_CASELOADS_API_HOST}
    manage-users:
      host: ${ME_CASELOADS_API_HOST}
    user:
      role: ${AUTHORISED_ROLES}
    system:
      role: ${AUTHORISED_ROLES}
      token:
        enabled: ${SYSTEM_TOKEN_ENABLED}
    definition:
      locations: unused.json
      repository: memory
    redshiftdataapi:
      secretarn: arn:aws:secretsmanager:eu-west-2:771283872747:secret:dpr-redshift-secret-development-rLHcQZ
      clusterid: dpr-redshift-development
      database: datamart
      tokenrefreshdurationsec: 3600
      s3location: dpr-working-development/reports
      athenaworkgroup: dpr-generic-athena-workgroup
    aws:
      sts:
        enabled: true

logging:
  level:
    uk.gov.justice.digital.hmpps.digitalprisonreportinglib: debug
    org.springframework.security.oauth2: debug
    org.springframework.security: debug
    com.nimbusds.jose.jwk: debug
    org.springframework.jdbc: debug


