# Per environment values which override defaults in hmpps-dpr-tools-api/values.yaml

generic-service:
  serviceAccountName: "dpr-tools-development-cross-iam"

  ingress:
    host: dpr-tools-api-dev-probation.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    HMPPS_AUTH_URL: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    ME_CASELOADS_API_HOST: https://manage-users-api-dev.hmpps.service.justice.gov.uk
    URL_ENV_SUFFIX: dev
    REDSHIFT_DATA_CLUSTER_ID: dpr-redshift-development
    REDSHIFT_DATA_S3_LOCATION: dpr-working-development/reports
    DPR_LIB_AWS_ACCOUNTID: "771283872747"

  scheduledDowntime:
    enabled: true
    startupOverride: '40 7 * * 1-5' # Start at 7.40am UTC Monday-Friday
    shutdown: '20 20 * * 1-5' # Stop at 8.20pm UTC Monday-Friday

  allowlist:
    groups:
      - circleci
      - internal

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: probation-frontend-alerts-dev
